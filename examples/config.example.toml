# news-radar example configuration
#
# Copy this file to config.toml (next to your feeds.csv) and edit the values
# below. Nothing in this file is secret — it's safe to commit to a public repo.
# Secrets (Gmail client id/secret, ANTHROPIC_API_KEY, etc.) belong in a .env
# file next to this config, or in real environment variables. See docs/SETUP.md.

[site]
title = "My News Radar"
base_url = "https://example.github.io/my-news-radar"
author_name = "Jane Example"
author_email = "jane@example.com"
# URL path segment between base_url and each topic's output_dir. Leave unset
# (or "") if [paths] output_root below IS the published docroot — the common
# case, and true for this example (output_root = "output" gets served
# directly at base_url). Set this if output_root is a SUBDIRECTORY of a larger
# site's docroot (e.g. output_root = "../my-site/techradar" but base_url points
# at "my-site"'s root) — set it to "techradar" in that case.
# public_path_prefix = ""

[models]
# Base/default models — any topic file can override a subset of these in its
# own [models] table (see examples/topics/ai.example.toml). "provider/model" —
# provider defaults to ollama if omitted, so bare names like "llama3.2" work
# too. Any Ollama model you've pulled locally (`ollama pull <name>`) works;
# "anthropic/<model>" shells out to a local `claude` CLI instead — see
# docs/SETUP.md.
summarize_model = "ollama/llama3.2"
rank_model = "ollama/qwen3.5:9b"
# classify_model = "ollama/qwen3.5:9b"  # topic relevance is a judgment call, not
# prose generation — defaults to rank_model when omitted (see config.py), NOT
# summarize_model. Uncomment to pin it independently of rank_model.
dedup_model = "ollama/llama3.2"
# dedup_model = "anthropic/claude-haiku-4-5"  # alternative: local claude CLI
ad_detector_model = "ollama/ad-detector"
ad_gate_enabled = true

[pipeline]
lookback_hours = 24
llm_workers = 2
url_workers = 10
article_body_char_cap = 20000
tts_workers = 2
arxiv_max_papers = 10

[gmail]
# client_id / client_secret / credentials_path are read from the environment
# or .env, never from this file (see docs/SETUP.md). token_path and
# credentials_path below are resolved relative to this config file if not
# absolute.
token_path = "secrets/token.json"
# credentials_path = "secrets/credentials.json"

[paths]
output_root = "output"
# Default feeds.csv, used by any topic that doesn't set its own [paths]
# feeds_csv override (see examples/topics/*.example.toml).
feeds_csv = "feeds.csv"

# --- Topics -----------------------------------------------------------------
# Each topic gets its own file — see examples/topics/ai.example.toml and
# examples/topics/robotics.example.toml. files below are resolved relative to
# this config file.

[topics]
files = ["topics/ai.example.toml", "topics/robotics.example.toml"]

# --- Publish hook -------------------------------------------------------
# Uncomment to auto-commit + push generated output after each run (skipped
# automatically when --dry-run is passed). See examples/hooks/git_publish.py.
# [publish]
# hook = "hooks.git_publish:publish_hook"
