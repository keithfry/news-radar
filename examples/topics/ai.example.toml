# One topic per file. feed_category must match a value in the "Category"
# column of feeds.csv (or "Both", which is included in every topic).
# classifier_prompt is the full LLM instruction block used to decide whether
# an item belongs in this topic's digest.

[topic]
name = "ai"
display_name = "AI"
feed_category = "AI"
output_dir = "ai"
file_prefix = "ai-radar"
fail_open = true  # on LLM parse failure, keep the item (matches original AI behavior)

# Non-empty keywords enable a fast-path: content matching none of these
# keywords skips straight to the LLM classifier below rather than being
# auto-accepted. An empty list (see the robotics topic) means every item is
# always LLM-classified.
keywords = [
    "ai", "ml", "llm", "robot", "neural", "machine learning",
    "deep learning", "language model", "generative", "autonomous vehicle",
    "reinforcement learning", "transformer model", "diffusion model",
    "anthropic", "openai", "google deepmind", "nvidia ai", "nvidia cuda",
    "hugging face",
]

classifier_prompt = """
Is the following content specifically about artificial intelligence, machine learning, robotics, or LLMs? Answer YES only if the primary topic is AI/ML/robotics technology.

Answer NO for: travel, lifestyle, product sales, referral programs, real estate, finance, sports, gaming, cloud gaming, advertisements, promotional emails, merchandise listings, gift guides, product catalogs, sponsored content, politics, elections, campaigns, live streams/videos not primarily about AI/ML/robotics, or any tech topic not primarily about AI/ML/robotics.

Example:
Title: 'Live video with Prof G Media now: Can Dems Take the Senate?'
→ {"relevant": false}

Answer with a JSON object: {"relevant": true} or {"relevant": false}.
"""

# Optional per-topic overrides — any subset of the base config's [models]
# fields. Uncomment to pin this topic to different models than the base
# config's defaults.
# [models]
# summarize_model = "ollama/llama3.2"

# Optional per-topic feeds.csv override, resolved relative to this file.
# Uncomment if this topic reads from its own feed list instead of the base
# config's [paths] feeds_csv.
# [paths]
# feeds_csv = "../feeds/ai-feeds.csv"
